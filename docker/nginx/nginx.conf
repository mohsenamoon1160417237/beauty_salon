events { worker_connections 1024; }

http {
  # Security headers applied globally
  add_header X-Frame-Options DENY always;
  add_header X-Content-Type-Options nosniff always;
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  add_header Referrer-Policy "no-referrer-when-downgrade" always;

  # Rate limiting zones
  limit_req_zone $binary_remote_addr zone=whatsapp:10m rate=30r/m;
  limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;

  # Redirect HTTP → HTTPS
  server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
  }

  # n8n (WhatsApp webhooks + UI)
  server {
    listen 443 ssl http2;
    server_name n8n.shah-gmbh.com;

    ssl_certificate     /etc/letsencrypt/live/n8n.shah-gmbh.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/n8n.shah-gmbh.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # WhatsApp webhook endpoint — public, higher rate limit from Meta IPs
    location /webhook/whatsapp-incoming {
      limit_req zone=whatsapp burst=10 nodelay;
      proxy_pass http://n8n:5678;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 30s;
    }

    location / {
      proxy_pass http://n8n:5678;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_read_timeout 300s;
    }
  }

  # Cal.com
  server {
    listen 443 ssl http2;
    server_name cal.shah-gmbh.com;

    ssl_certificate     /etc/letsencrypt/live/n8n.shah-gmbh.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/n8n.shah-gmbh.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location / {
      proxy_pass http://calcom:3000;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-Proto https;
      proxy_read_timeout 60s;
      client_max_body_size 10M;
    }
  }

  # Booking API (internal only — not exposed publicly)
  # Access via booking-api:8000 within Docker network
}
