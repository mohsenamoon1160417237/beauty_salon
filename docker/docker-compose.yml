version: "3.9"

# ─────────────────────────────────────────────────────────────
# Salon WhatsApp Booking Agent — Full Stack
#
# Services:
#   postgres      → Primary database
#   redis         → Session cache + distributed locks
#   calcom        → Cal DIY (self-hosted Cal.com)
#   booking-api   → Python FastAPI scheduling service
#   n8n           → Workflow orchestration + AI agent
#   nginx         → Reverse proxy + TLS termination
# ─────────────────────────────────────────────────────────────

x-common-env: &common-env
  TZ: UTC

networks:
  internal:
    driver: bridge
  public:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  calcom_data:
  n8n_data:
  nginx_certs:

services:

  # ─── PostgreSQL ────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: salon_booking
      POSTGRES_USER: ${POSTGRES_USER:-salon}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?required}
      POSTGRES_MULTIPLE_DATABASES: salon_booking,calcom
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/001_schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro
      - ./docker/postgres/init-multiple-dbs.sh:/docker-entrypoint-initdb.d/000_init.sh:ro
    networks: [internal]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-salon} -d salon_booking"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G

  # ─── Redis ────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:?required}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 60 1000
      --appendonly yes
    volumes:
      - redis_data:/data
    networks: [internal]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ─── Cal.com (Cal DIY) ────────────────────────────────────
  calcom:
    image: calcom/cal.com:latest
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/calcom
      DATABASE_DIRECT_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/calcom
      NEXTAUTH_SECRET: ${CALCOM_NEXTAUTH_SECRET:?required}
      NEXTAUTH_URL: ${CALCOM_URL:?required}
      CALENDSO_ENCRYPTION_KEY: ${CALCOM_ENCRYPTION_KEY:?required}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@example.com}
      EMAIL_SERVER_HOST: ${SMTP_HOST:-}
      EMAIL_SERVER_PORT: ${SMTP_PORT:-587}
      EMAIL_SERVER_USER: ${SMTP_USER:-}
      EMAIL_SERVER_PASSWORD: ${SMTP_PASSWORD:-}
      NEXT_PUBLIC_WEBAPP_URL: ${CALCOM_URL}
      NEXT_PUBLIC_API_V2_URL: ${CALCOM_URL}/api/v2
    depends_on:
      postgres:
        condition: service_healthy
    networks: [internal, public]
    volumes:
      - calcom_data:/app/.next/cache
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ─── Python Booking API ────────────────────────────────────
  booking-api:
    build:
      context: ../python-service
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/salon_booking
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CALCOM_BASE_URL: http://calcom:3000
      CALCOM_API_KEY: ${CALCOM_API_KEY:?required}
      CALCOM_WEBHOOK_SECRET: ${CALCOM_WEBHOOK_SECRET:?required}
      WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID:?required}
      WHATSAPP_ACCESS_TOKEN: ${WHATSAPP_ACCESS_TOKEN:?required}
      WHATSAPP_VERIFY_TOKEN: ${WHATSAPP_VERIFY_TOKEN:?required}
      SECRET_KEY: ${API_SECRET_KEY:?required}
      APP_ENV: production
      LOG_LEVEL: INFO
      SENTRY_DSN: ${SENTRY_DSN:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      calcom:
        condition: service_healthy
    networks: [internal]
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    deploy:
      replicas: 2  # horizontal scale — both share Redis locks
      resources:
        limits:
          memory: 512M

  # ─── n8n ──────────────────────────────────────────────────
  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: salon_booking
      DB_POSTGRESDB_USER: ${POSTGRES_USER}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:?required}
      N8N_HOST: ${N8N_HOST:-localhost}
      N8N_PORT: 5678
      N8N_PROTOCOL: https
      WEBHOOK_URL: ${N8N_WEBHOOK_URL:?required}
      EXECUTIONS_PROCESS: main
      EXECUTIONS_MODE: queue
      QUEUE_BULL_REDIS_HOST: redis
      QUEUE_BULL_REDIS_PORT: 6379
      QUEUE_BULL_REDIS_PASSWORD: ${REDIS_PASSWORD}
      N8N_LOG_LEVEL: info
      # AI credentials (set in n8n UI, not env for security)
      SCHEDULING_SERVICE_URL: http://booking-api:8000
      TENANT_ID: ${TENANT_ID:-00000000-0000-0000-0000-000000000001}
      SALON_NAME: ${SALON_NAME:-Glamour Beauty Salon}
      WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID}
      WHATSAPP_ACCESS_TOKEN: ${WHATSAPP_ACCESS_TOKEN}
      WHATSAPP_APP_SECRET: ${WHATSAPP_APP_SECRET:?required}
    volumes:
      - n8n_data:/home/node/.n8n
      - ../n8n-workflows:/home/node/.n8n/workflows:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      booking-api:
        condition: service_healthy
    networks: [internal, public]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5678/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Nginx Reverse Proxy ──────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_certs:/etc/letsencrypt:ro
    depends_on:
      - n8n
      - calcom
    networks: [public]
